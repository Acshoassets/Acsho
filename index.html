<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acsho - Editing Asset Exchange</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; color: #111; }
    header { background: #111; color: white; text-align: center; padding: 40px 20px; }
    h1 { margin: 0; font-size: 3em; }
    p.tagline { margin-top: 10px; font-size: 1.2em; color: #ccc; }
    .categories { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .category-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; font-weight: 600; text-decoration: none; color: #111; }
    .category-box:hover { background: #eaeaea; }
    footer { background: #222; color: #ccc; text-align: center; padding: 20px; font-size: 0.9em; }
    .support { margin-top: 40px; padding: 20px; background: #fff; max-width: 600px; margin-left: auto; margin-right: auto; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .support h2 { margin-top: 0; }
    .floating-upload { position: fixed; bottom: 20px; right: 20px; background: #111; color: white; padding: 14px 18px; border-radius: 50%; font-size: 20px; text-decoration: none; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

<header>
  <h1>ACSHO</h1>
  <p class="tagline">The Editing Asset Hub</p>
</header>

<div class="categories">
  <a href="davinci.html" class="category-box">DaVinci Resolve</a>
  <a href="premiere.html" class="category-box">Premiere Pro</a>
  <a href="capcut.html" class="category-box">CapCut</a>
  <a href="vn.html" class="category-box">VN Templates</a>
  <a href="video.html" class="category-box">Video Assets</a>
  <a href="sfx.html" class="category-box">SFX</a>
</div>

<div class="support">
  <h2>Contact Support</h2>
  <form>
    <input type="text" placeholder="Your Name" required style="width:100%; padding:10px; margin-bottom:10px;"><br>
    <input type="email" placeholder="Your Email" required style="width:100%; padding:10px; margin-bottom:10px;"><br>
    <textarea placeholder="Your Message" required style="width:100%; padding:10px; height:100px;"></textarea><br>
    <button type="submit" style="padding:10px 20px; background:#111; color:white; border:none; border-radius:6px;">Send</button>
  </form>
</div>

<a class="floating-upload" href="upload.html">⬆</a>

<footer>
  &copy; 2025 Acsho. All rights reserved.
</footer>

</body>
</html>
